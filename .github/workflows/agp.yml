name: Sonatype Guide - Agentic Patches

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full or security'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - security
      verbose:
        description: 'Enable verbose output (may expose sensitive data in logs)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  agp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run AGP
        uses: sonatype/agp-action@v1
        with:
          mode: ${{ inputs.mode }}
          create-pr: 'true'
          draft-pr: 'true'
          enable-agent: 'false'
          verbose: ${{ inputs.verbose }}
          docker-registry: sonatype.repo.sonatype.app/docker-all
          docker-username: ${{ secrets.SONATYPE_DOCKER_USERNAME }}
          docker-password: ${{ secrets.SONATYPE_DOCKER_PASSWORD }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGP_API_URL: https://api.guide.sonatype.com
