name: AGP - Dependency Upgrades

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - security
      dry-run:
        description: 'Preview changes without applying them'
        required: false
        default: false
        type: boolean
      group:
        description: 'Apply only a specific group by ID (optional)'
        required: false
        default: ''

jobs:
  upgrade:
    runs-on: local-dev
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Run AGP
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGP_API_URL: http://localhost:8090
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_DRY_RUN: ${{ inputs.dry-run }}
          INPUT_CREATE_PR: 'true'
          INPUT_DRAFT_PR: 'true'
          INPUT_VERBOSE: 'true'
          INPUT_WORKING_DIRECTORY: '.'
          INPUT_GROUP: ${{ inputs.group }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/github/workspace \
            -e ANTHROPIC_API_KEY \
            -e AGP_API_URL \
            -e GITHUB_TOKEN \
            -e GH_TOKEN="${GITHUB_TOKEN}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_ACTIONS=true \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -e INPUT_MODE \
            -e INPUT_DRY_RUN \
            -e INPUT_CREATE_PR \
            -e INPUT_DRAFT_PR \
            -e INPUT_VERBOSE \
            -e INPUT_WORKING_DIRECTORY \
            -e INPUT_GROUP \
            johnsoma/agp:latest
